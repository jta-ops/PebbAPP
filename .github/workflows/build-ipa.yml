name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project PebbApp.xcodeproj \
            -scheme PebbApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          APP=$(find DerivedData/Build/Products -name "*.app" -not -path "*iphonesimulator*" | head -1)
          echo "Using: $APP"
          # Ad-hoc sign so sideloading tools (Sideloadly, AltStore) recognise the IPA
          codesign --force --deep --sign - "$APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r Pebb.ipa Payload
          ls -lh Pebb.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pebb-IPA
          path: Pebb.ipa
          retention-days: 30
