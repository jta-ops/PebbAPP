name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -scheme PebbApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          set -e
          BINARY=$(find DerivedData/Build/Products -type f -name "PebbApp" -not -path "*.dSYM*" -maxdepth 4 | head -1)
          echo "Binary: $BINARY"
          BUNDLE=$(find DerivedData/Build/Products -name "*.bundle" -maxdepth 4 | head -1)
          echo "Bundle: $BUNDLE"
          mkdir -p Payload/PebbApp.app
          cp "$BINARY" Payload/PebbApp.app/PebbApp
          cp Sources/PebbApp/Info.plist Payload/PebbApp.app/Info.plist
          if [ -n "$BUNDLE" ]; then
            cp -r "$BUNDLE" Payload/PebbApp.app/
          fi
          zip -r Pebb.ipa Payload
          ls -lh Pebb.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pebb-IPA
          path: Pebb.ipa
          retention-days: 30
