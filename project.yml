name: PebbApp
options:
  bundleIdPrefix: dev.pebb
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  PebbApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/PebbApp
        excludes:
          - Info.plist
      - path: Sources/Shared
    resources:
      - path: Sources/PebbApp/Assets.xcassets
    info:
      path: Sources/PebbApp/Info.plist
      properties:
        CFBundleDisplayName: Pebb
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSSupportsLiveActivities: true
        NSCameraUsageDescription: "Used to send photos to Pebb"
        NSPhotoLibraryUsageDescription: "Used to send photos to Pebb"
        NSMicrophoneUsageDescription: "Used to send voice messages to Pebb"
    dependencies:
      - target: PebbShare
        embed: true
      - target: PebbWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pebb.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_ENTITLEMENTS: Sources/PebbApp/PebbApp.entitlements
        ENABLE_BITCODE: NO

  PebbShare:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ShareExtension
        excludes:
          - Info.plist
    info:
      path: Sources/ShareExtension/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pebb.app.share
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_BITCODE: NO
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  PebbWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/PebbWidget
        excludes:
          - Info.plist
      - path: Sources/Shared
    resources:
      - path: Sources/PebbWidget/Assets.xcassets
    info:
      path: Sources/PebbWidget/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pebb.app.widget
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_ENTITLEMENTS: Sources/PebbWidget/PebbWidget.entitlements
        ENABLE_BITCODE: NO
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
